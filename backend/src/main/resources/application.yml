server:
  port: 8080

spring:
  mandatory-file-encoding: UTF-8
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/myblog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI}

avatar:
  upload-dir: ${AVATAR_UPLOAD_DIR}
  base-url: ${AVATAR_BASE_URL}

ai-news:
  translation:
    enabled: true
    primary: baidu
    baidu:
      app-id: ${BAIDU_TRANSLATE_APP_ID}
      secret-key: ${BAIDU_TRANSLATE_SECRET_KEY}
