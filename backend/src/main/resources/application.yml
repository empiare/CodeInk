server:
  port: 8080

spring:
  mandatory-file-encoding: UTF-8
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/myblog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  security:
    oauth2:
      client:
        registration:
          google:
            scope:
              - email
              - profile

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  expiration: 86400000

# 头像上传配置（环境变量优先，未设置则自动检测OS选择路径）
avatar:
  upload-dir: ${AVATAR_UPLOAD_DIR:}
  base-url: ${AVATAR_BASE_URL:}

# AI资讯翻译配置
ai-news:
  translation:
    enabled: true
    primary: baidu
